<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Plasma</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <!-- Level Editor Panel -->
        <div id="level-editor-panel" class="level-editor-hidden">
            <div class="editor-header">
                <h2>Level Editor</h2>
                <button id="close-editor-btn" class="editor-close">×</button>
            </div>
            
            <div class="editor-section">
                <h3>Mode</h3>
                <div class="editor-buttons">
                    <button class="editor-btn" data-mode="player">Place Player</button>
                    <button class="editor-btn" data-mode="npc">Place NPC</button>
                    <button class="editor-btn" data-mode="zone">Place Zone</button>
                    <button class="editor-btn" data-mode="prop">Place Prop</button>
                    <button class="editor-btn" data-mode="select">Select/Edit</button>
                </div>
            </div>

            <div class="editor-section">
                <h3>Properties</h3>
                <div id="properties-panel">
                    <p style="color: #aaa; font-size: 12px;">Select an object to edit</p>
                </div>
            </div>

            <div class="editor-section">
                <h3>File</h3>
                <div class="editor-buttons">
                    <button class="editor-btn" id="export-level-btn">Export JSON</button>
                    <button class="editor-btn" id="import-level-btn">Import JSON</button>
                    <button class="editor-btn" id="clear-level-btn" style="background: #944;">Clear All</button>
                </div>
                <textarea id="json-import" placeholder="Paste JSON here" style="display:none;"></textarea>
                <button class="editor-btn" id="import-confirm-btn" style="display:none; margin-top: 8px;">Confirm Import</button>
            </div>

            <div class="editor-section">
                <h3>Info</h3>
                <div id="editor-info" style="font-size: 11px; color: #888;">
                    <p>Press <strong>E</strong> to toggle</p>
                    <p id="object-count">Objects: 0</p>
                </div>
            </div>
        </div>
        
        <!-- Scene Containers -->
        <div id="menu-scene" class="scene-container"></div>
        <div id="level-complete-scene" class="scene-container"></div>
        
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <div id="emotional-state">
                <div id="emotional-state-label">neutral</div>
                <div class="state-bar">
                    <span class="label">Valence</span>
                    <div class="bar"><div class="fill" id="valence-bar"></div></div>
                </div>
                <div class="state-bar">
                    <span class="label">Arousal</span>
                    <div class="bar"><div class="fill" id="arousal-bar"></div></div>
                </div>
                <div class="state-bar">
                    <span class="label">Connection</span>
                    <div class="bar"><div class="fill" id="connection-bar"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
